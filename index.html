<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonatta — Tu música en las nubes</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  /* Se mantienen tus estilos originales para navy blue y orange */
  :root {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24; --bg4: #22222f;
    --border: #2a2a3a; --accent: #7c5cfc; --accent2: #a78bfa;
    --accent3: #38bdf8; --green: #34d399; --red: #f87171;
    --text: #f0f0ff; --text2: #a0a0c0; --text3: #606080;
    --card: #13131c; --player-h: 90px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  
  /* Estilos simplificados para el ejemplo */
  .app-body { display: flex; flex: 1; }
  .sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 20px; }
  .main { flex: 1; padding: 30px; overflow-y: auto; }
  .song-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
  .song-row:hover { background: var(--bg3); }
  
  .player-bar { height: var(--player-h); background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; position: fixed; bottom: 0; width: 100%; }
  .prog-bar { flex: 1; height: 4px; background: var(--bg4); margin: 0 15px; cursor: pointer; position: relative; }
  .prog-fill { height: 100%; background: var(--accent); width: 0%; }
  .ctrl-play { background: #ee9c36; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<audio id="audioPlayer"></audio>

<div class="app-body">
  <aside class="sidebar">
    <h2 style="color: #ee9c36; font-family: 'Nunito';">Sonatta</h2>
    <p style="font-size: 0.8rem; color: var(--text3);">BIBLIOTECA</p>
  </aside>

  <main class="main">
    <h1 style="margin-bottom: 20px;">Mis Canciones</h1>
    <div id="songsList">
      </div>
  </main>
</div>

<footer class="player-bar">
  <div id="currentInfo" style="width: 200px;">
    <div id="trackTitle" style="font-weight: 600;">Selecciona una canción</div>
    <div id="trackArtist" style="font-size: 0.8rem; color: var(--text3);">---</div>
  </div>
  
  <button class="ctrl-play" id="playBtn">▶</button>
  
  <div class="prog-bar" id="progBar">
    <div class="prog-fill" id="progFill"></div>
  </div>
  
  <div id="timeInfo" style="font-size: 0.8rem; width: 100px;">0:00 / 0:00</div>
</footer>

<script>
  // Datos de ejemplo con archivos de audio reales (puedes cambiarlos por tus rutas)
  const songs = [
    { id: 1, title: "Lofi Hip Hop", artist: "Chill Beats", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { id: 2, title: "Acoustic Breeze", artist: "Guitarist", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
  ];

  const audio = document.getElementById('audioPlayer');
  const playBtn = document.getElementById('playBtn');
  const progFill = document.getElementById('progFill');
  const progBar = document.getElementById('progBar');
  const timeInfo = document.getElementById('timeInfo');
  
  let isPlaying = false;

  // Cargar lista de canciones
  const listContainer = document.getElementById('songsList');
  songs.forEach(song => {
    const row = document.createElement('div');
    row.className = 'song-row';
    row.innerHTML = `<strong>${song.title}</strong> &nbsp; - ${song.artist}`;
    row.onclick = () => loadSong(song);
    listContainer.appendChild(row);
  });

  function loadSong(song) {
    audio.src = song.url;
    document.getElementById('trackTitle').innerText = song.title;
    document.getElementById('trackArtist').innerText = song.artist;
    playSong();
  }

  function playSong() {
    audio.play();
    isPlaying = true;
    playBtn.innerText = '⏸';
  }

  function togglePlay() {
    if (isPlaying) {
      audio.pause();
      playBtn.innerText = '▶';
    } else {
      if(audio.src) audio.play();
      playBtn.innerText = '⏸';
    }
    isPlaying = !isPlaying;
  }

  playBtn.onclick = togglePlay;

  // Actualizar barra de progreso
  audio.ontimeupdate = () => {
    const { duration, currentTime } = audio;
    if (duration) {
      const percent = (currentTime / duration) * 100;
      progFill.style.width = `${percent}%`;
      
      const curM = Math.floor(currentTime / 60);
      const curS = Math.floor(currentTime % 60).toString().padStart(2, '0');
      const durM = Math.floor(duration / 60);
      const durS = Math.floor(duration % 60).toString().padStart(2, '0');
      
      timeInfo.innerText = `${curM}:${curS} / ${durM}:${durS}`;
    }
  };

  // Click en barra para saltar tiempo
  progBar.onclick = (e) => {
    const width = progBar.clientWidth;
    const clickX = e.offsetX;
    const duration = audio.duration;
    audio.currentTime = (clickX / width) * duration;
  };
</script>
</body>
</html>
